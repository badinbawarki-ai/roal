<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAL Real Estate - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body x-data="realEstateApp()">

    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 bg-slate-900 flex items-center justify-center p-4 z-50">
            <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
                <div class="bg-yellow-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-slate-900 text-2xl font-bold">R</div>
                <h2 class="text-2xl font-bold mb-6 text-slate-800">چوونە ژوورێ (Admin)</h2>
                <input type="password" x-model="passwordInput" placeholder="پەیڤا نهێنی بنڤێسە..." class="w-full p-4 bg-slate-100 border-2 border-transparent focus:border-yellow-500 rounded-2xl outline-none mb-4 text-center">
                <button @click="login()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all">چوونە ژوورێ</button>
                <p x-show="error" class="text-red-500 mt-4 text-sm font-bold">پەیڤا نهێنی شنیە!</p>
            </div>
        </div>
    </template>

    <div x-show="isLoggedIn">
        <header class="bg-slate-900 text-white p-6 shadow-xl sticky top-0 z-40">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="text-yellow-500 font-black text-2xl">ROAL</span>
                    <span class="bg-slate-700 px-3 py-1 rounded-md text-[10px] text-yellow-500 uppercase">Dashboard</span>
                </div>
                <div class="flex gap-2">
                    <button @click="showForm = !showForm" class="bg-yellow-500 text-slate-900 px-4 py-2 rounded-xl font-bold text-sm">
                        <i class="fa-solid fa-plus ml-1"></i> زێدەکرن
                    </button>
                    <button @click="logout()" class="bg-red-500 text-white p-2 rounded-xl"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </header>

        <main class="max-w-5xl mx-auto p-4 md:p-8">
            <div x-show="showForm" x-transition class="bg-white p-6 rounded-[32px] shadow-lg mb-8 border border-yellow-100">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 mr-2">ناڤێ مۆلکی</label>
                        <input type="text" x-model="newItem.title" class="w-full p-3 bg-slate-50 rounded-xl outline-none border focus:border-yellow-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 mr-2">بها (USD)</label>
                        <input type="text" x-model="newItem.price" class="w-full p-3 bg-slate-50 rounded-xl outline-none border focus:border-yellow-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 mr-2">جۆر</label>
                        <select x-model="newItem.type" class="w-full p-3 bg-slate-50 rounded-xl outline-none border">
                            <option value="خانوو">خانوو</option>
                            <option value="ئەرد">ئەرد</option>
                            <option value="شوقە">شوقە</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 mr-2">روبەر</label>
                        <input type="text" x-model="newItem.area" class="w-full p-3 bg-slate-50 rounded-xl outline-none border focus:border-yellow-500">
                    </div>
                </div>
                <button @click="addItem()" class="w-full mt-6 bg-slate-900 text-white font-bold py-4 rounded-2xl">بەلاڤ بکە</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-xs font-bold">هەمی مۆلک</p>
                    <p class="text-2xl font-black text-slate-800" x-text="items.length"></p>
                </div>
                </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="(item, index) in items" :key="index">
                    <div class="bg-white rounded-[32px] overflow-hidden shadow-md group border border-slate-100">
                        <div class="h-48 bg-slate-200 relative">
                            <img :src="item.image" class="w-full h-full object-cover">
                            <div class="absolute top-4 right-4 flex gap-2">
                                <button @click="removeItem(index)" class="bg-red-500/90 text-white p-2 rounded-xl backdrop-blur-sm"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-2">
                                <span x-text="item.type" class="text-[10px] font-bold bg-yellow-100 text-yellow-700 px-2 py-1 rounded-md uppercase"></span>
                                <span class="text-slate-900 font-black text-lg" x-text="item.price"></span>
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg mb-4" x-text="item.title"></h3>
                            <div class="flex border-t pt-4 text-slate-500 text-xs gap-4">
                                <span><i class="fa-solid fa-ruler-combined ml-1 text-yellow-500"></i> <span x-text="item.area"></span></span>
                                <span><i class="fa-solid fa-location-dot ml-1 text-yellow-500"></i> دهۆک</span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <script>
        function realEstateApp() {
            return {
                isLoggedIn: false,
                passwordInput: '',
                correctPassword: 'roal2026', // <--- پەیڤا نهێنی ل ڤێرێ بگهۆڕە
                error: false,
                showForm: false,
                newItem: { title: '', price: '', type: 'خانوو', area: '', image: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=500' },
                items: [
                    { title: 'خانوو ل مالتا لۆکس', price: '$320,000', type: 'خانوو', area: '250m²', image: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=500' },
                    { title: 'ئەردێ کەرتی ٤٠م', price: '$85,000', type: 'ئەرد', area: '300m²', image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=500' }
                ],
                login() {
                    if (this.passwordInput === this.correctPassword) {
                        this.isLoggedIn = true;
                        this.error = false;
                    } else {
                        this.error = true;
                        this.passwordInput = '';
                    }
                },
                logout() {
                    this.isLoggedIn = false;
                    this.passwordInput = '';
                },
                addItem() {
                    if(this.newItem.title) {
                        this.items.unshift({...this.newItem});
                        this.showForm = false;
                        this.newItem = { title: '', price: '', type: 'خانوو', area: '', image: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=500' };
                    }
                },
                removeItem(index) {
                    if(confirm('تۆ پشت راستی دڤێت ئەڤی مۆلکی ڕەشکەی؟')) {
                        this.items.splice(index, 1);
                    }
                }
            }
        }
    </script>
</body>
</html>
